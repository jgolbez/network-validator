tests:
  # ============================================================================
  # STEP 1: Connectivity Tests - Host1 to 4.2.2.2 (should succeed)
  # ============================================================================

  - name: "Host1 can ping 4.2.2.2 (should receive replies)"
    description: "Host1 should receive echo replies from 4.2.2.2"
    command: "ssh -l cisco 198.18.1.221 \"ping -c 3 -W 2 4.2.2.2\""
    match_type: "contains"
    expected: "bytes from 4.2.2.2"
    ssh_password: "cisco"
    devices: ["localhost"]


  - name: "Host1 cannot ping 8.8.8.8 (one-way connectivity)"
    description: "Host1 should NOT receive echo replies from 8.8.8.8 (one-way connection)"
    command: "ssh -l cisco 198.18.1.221 \"ping -c 3 -W 2 8.8.8.8\""
    match_type: "not_contains"
    expected: "bytes from 8.8.8.8"
    ssh_password: "cisco"
    devices: ["localhost"]

  # ============================================================================
  # STEP 2: Connectivity Tests - Host2 to 4.2.2.2 (should succeed)
  # ============================================================================

  - name: "Host2 can ping 4.2.2.2 (should receive replies)"
    description: "Host2 should receive echo replies from 4.2.2.2"
    command: "ssh -l cisco 198.18.1.222 \"ping -c 3 -W 2 4.2.2.2\""
    match_type: "contains"
    expected: "bytes from 4.2.2.2"
    ssh_password: "cisco"
    devices: ["localhost"]

  - name: "Host2 cannot ping 8.8.8.8 (one-way connectivity)"
    description: "Host2 should NOT receive echo replies from 8.8.8.8 (one-way connection)"
    command: "ssh -l cisco 198.18.1.222 \"ping -c 3 -W 2 8.8.8.8\""
    match_type: "not_contains"
    expected: "bytes from 8.8.8.8"
    ssh_password: "cisco"
    devices: ["localhost"]

  # ============================================================================
  # STEP 3: Constraint Validation - No Access-Lists Blocking Traffic
  # ============================================================================

  - name: "No ACLs blocking traffic to 4.2.2.2 or 8.8.8.8"
    description: "Check that no ACLs deny traffic to the challenge IPs"
    command: "show run | include access-list"
    match_type: "not_regex"
    expected: 'access-list.*deny.*(4\.2\.2\.2|8\.8\.8\.8)'
    devices: ["Dist1", "Dist2", "Acc1", "Acc2", "R1", "R2", "ISP1", "INET"]

  # ============================================================================
  # STEP 4: Constraint Validation - No Static Routes
  # ============================================================================

  - name: "No static routes used (ip route x.x.x.x)"
    description: "Static routes (ip route with destination IP) should not be present"
    command: "show run"
    match_type: "not_regex"
    expected: 'ip route\s+\d+\.\d+\.\d+\.\d+'
    devices: ["Dist1", "Dist2", "Acc1", "Acc2", "R1", "R2", "ISP1", "INET"]

  # ============================================================================
  # STEP 5: Constraint Validation - No Null Routing
  # ============================================================================

  - name: "No null interface routing (Null0)"
    description: "Routes to null interfaces should not be configured"
    command: "show run"
    match_type: "not_regex"
    expected: '(?:ip route|route).*[Nn]ull\s*0'
    devices: ["Dist1", "Dist2", "Acc1", "Acc2", "R1", "R2", "ISP1", "INET"]

  # ============================================================================
  # STEP 6: Constraint Validation - No Shutdown on Active Interfaces
  # ============================================================================

  - name: "Dist1 active interfaces not shutdown"
    description: "Verify GigabitEthernet0/0, 1/0/1, 1/0/2, 1/0/3, 1/0/4 are not shutdown"
    command: "show run | section GigabitEthernet(0/0|1/0/[1234])"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["Dist1"]

  - name: "Dist2 active interfaces not shutdown"
    description: "Verify GigabitEthernet0/0, 1/0/1, 1/0/2, 1/0/3, 1/0/4 are not shutdown"
    command: "show run | section GigabitEthernet(0/0|1/0/[1234])"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["Dist2"]

  - name: "Acc1 active interfaces not shutdown"
    description: "Verify GigabitEthernet0/0, 1/0/1, 1/0/2, 1/0/3 are not shutdown"
    command: "show run | section GigabitEthernet(0/0|1/0/[123])"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["Acc1"]

  - name: "Acc2 active interfaces not shutdown"
    description: "Verify GigabitEthernet0/0, 1/0/1, 1/0/2, 1/0/3 are not shutdown"
    command: "show run | section GigabitEthernet(0/0|1/0/[123])"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["Acc2"]

  - name: "R1 active interfaces not shutdown"
    description: "Verify GigabitEthernet1, 2, 3, 4 are not shutdown"
    command: "show run | section GigabitEthernet[1-4]"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["R1"]

  - name: "R2 active interfaces not shutdown"
    description: "Verify GigabitEthernet1, 2, 3, 4 are not shutdown"
    command: "show run | section GigabitEthernet[1-4]"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["R2"]

  - name: "ISP1 active interfaces not shutdown"
    description: "Verify GigabitEthernet1, 2, 3, 4 are not shutdown"
    command: "show run | section GigabitEthernet[1-4]"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["ISP1"]

  - name: "INET active interfaces not shutdown"
    description: "Verify GigabitEthernet1, 4 are not shutdown"
    command: "show run | section GigabitEthernet[14]"
    match_type: "not_regex"
    expected: '(?:^|\n)\s*shutdown\s*(?:$|\n)'
    devices: ["INET"]
